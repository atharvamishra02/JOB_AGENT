<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Metallic/Cyber Gradient for Frame -->
    <linearGradient id="cyberGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Eyes Glowing Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Shadow/Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shape (Rounded Badge) -->
  <rect x="24" y="24" width="464" height="464" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Ring Highlight -->
  <rect x="24" y="24" width="464" height="464" rx="128" fill="none" stroke="url(#cyberGrad)" stroke-width="8" stroke-opacity="0.3" />

  <!-- Robot Agent Icon with Shadow Glow -->
  <g filter="url(#glow)">
    <!-- Briefcase Base -->
    <path d="M128 310 L128 374 C128 398 148 418 172 418 L340 418 C364 418 384 398 384 374 L384 310 Z" fill="#111827" opacity="0.9" />
    
    <!-- Briefcase Handle/Antenna -->
    <path d="M216 102 L216 78 C216 66 226 56 238 56 L274 56 C286 56 296 66 296 78 L296 102" fill="none" stroke="url(#cyberGrad)" stroke-width="16" stroke-linecap="round" />
    
    <!-- Robot Head Frame -->
    <rect x="156" y="134" width="200" height="192" rx="48" fill="#1f2937" stroke="url(#cyberGrad)" stroke-width="16" />
    
    <!-- Ear nodes -->
    <rect x="124" y="190" width="32" height="80" rx="12" fill="url(#cyberGrad)" />
    <rect x="356" y="190" width="32" height="80" rx="12" fill="url(#cyberGrad)" />

    <!-- Robot Face Plate -->
    <rect x="180" y="158" width="152" height="112" rx="24" fill="#030712" />

    <!-- Grid lines -->
    <line x1="200" y1="214" x2="312" y2="214" stroke="#1f2937" stroke-width="2" />
    <line x1="256" y1="170" x2="256" y2="258" stroke="#1f2937" stroke-width="2" />

    <!-- Glowing Cyber Eyes -->
    <circle cx="216" cy="214" r="18" fill="url(#glowGrad)" />
    <circle cx="216" cy="214" r="6" fill="#ffffff" />
    
    <circle cx="296" cy="214" r="18" fill="url(#glowGrad)" />
    <circle cx="296" cy="214" r="6" fill="#ffffff" />

    <!-- Activity Indicator / Heartbeat on briefcase base -->
    <path d="M182 364 L222 364 L234 348 L246 380 L258 364 L330 364" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>