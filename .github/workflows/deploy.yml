name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Continuous Integration (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend Syntax Check
        run: |
          python -m py_compile main.py run_deploy.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend (Test Vite Build)
        working-directory: ./frontend
        run: npm run build

  deploy:
    name: Continuous Deployment (SSH Deploy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "--- Starting Deployment Process ---"
            
            # 1. Locate/Navigate to job_agent directory
            DEPLOY_DIR="/root/job_agent"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            # 2. Check if git repository is initialized
            if [ ! -d .git ]; then
              echo "Git repository not found. Initializing Git..."
              git init
              git remote add origin https://github.com/atharvamishra02/JOB_AGENT.git
            fi

            # 3. Pull latest main branch from clean Git history
            echo "Fetching latest changes..."
            git fetch origin
            git reset --hard origin/main

            # 4. Clean Docker cache and rebuild images
            echo "Rebuilding and restarting services..."
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            echo "--- Deployment Successful! ---"
